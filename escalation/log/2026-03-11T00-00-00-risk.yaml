root_cause_analysis: |
  The block appears to be a regex false positive. The pre-tool-boundary.sh hook
  converts glob patterns to regexes with:
    sed 's/\*\*/.*/' | sed 's/\*/[^\/]*/'
  The pattern "*.env.*" is converted to "[^\/]*.env.*" (only the first * is replaced,
  the second * after .env remains as a literal regex wildcard).
  In regex, "." matches any character, so ".env" matches any character followed by "env".
  The path "backend/alembic/env.py" contains "/env" which matches ".env" (the "/" matches
  "." and "env" matches "env"). This triggers the "*.env.*" rule which was intended to
  protect secrets files like ".env.production", not alembic configuration.
  The backend/alembic/env.py file is NOT a secrets file.

