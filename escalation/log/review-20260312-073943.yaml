        - FilterBar: search input + theme dropdown + status dropdown + "Clear filters" with X icon ✅
        - FeedbackTable: 6 columns (Client, Summary, Theme badge, Status badge, Date Logged, Edit link) ✅
        - Theme badge colours: purple/orange/blue/pink/teal — exact match to ui-spec ✅
        - Status badge colours: blue/amber/green — exact match to ui-spec ✅
        - EmptyState: two variants (no data + no matches) with correct text ✅
        - FeedbackForm: create/edit mode with correct button text ✅
        - Form validation: blur-based with red border + error text ✅
        - Delete: window.confirm with correct message text ✅
        - NotFoundState: correct text + "Return to list" link ✅
        - Date format: en-US with Mon DD, YYYY ✅
        - Row hover: bg-gray-50 transition ✅
        - 404 redirect to /feedback ✅
        - Root redirect / → /feedback ✅

    - id: "NOTE-003"
      title: "Search debounce implemented correctly"
      description: >
        300ms debounce on search input, immediate fetch on dropdown changes.
        Uses useRef for timer cleanup. Matches implementation plan open question default.

    - id: "NOTE-004"
      title: "Frontend properly handles maxLength on inputs"
      description: >
        client_name input has maxLength={255}, summary input has maxLength={500}.
        Matches DB column constraints and implementation plan open question #5 default.

    - id: "NOTE-005"
      title: "Test quality is high — adversarial approach confirmed"
      description: >
        81 tests including: SQL injection, empty strings, whitespace-only strings,
        case sensitivity, invalid enums, double delete, type coercion, long strings,
        boundary IDs (0, -1, non-integer), empty body PATCH (no-op), combined
        filters, "In Progress" space in query param. Well beyond happy path.

    - id: "NOTE-006"
      title: "Next.js 15 params pattern correctly used"
      description: >
        EditFeedbackPage uses `params: Promise<{ id: string }>` with `await params`
