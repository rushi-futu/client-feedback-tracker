# ═══════════════════════════════════════════════════════════════════
# ISSUES
# ═══════════════════════════════════════════════════════════════════

issues:

  blockers:
    - id: "BLOCK-001"
      file: "app/backend/app/schemas/feedback.py"
      line: "21-22"
      title: "Empty strings accepted for required fields client_name and summary"
      description: >
        FeedbackCreate schema uses bare `str` type for client_name and summary.
        Empty string "" passes Pydantic validation and creates a feedback item
        with blank fields. The contract says these are required — semantically,
        an empty string is not a valid value.
      fix: "Add `min_length=1` to client_name and summary fields using Field(min_length=1)"
      test_evidence: "BUG-001, BUG-002 from test-findings"
      promote: false

    - id: "BLOCK-002"
      file: "app/backend/app/schemas/feedback.py"
      line: "29"
      title: "Empty string accepted for client_name on PATCH"
      description: >
        FeedbackUpdate.client_name has no min_length validation. A PATCH with
        client_name="" blanks out a valid feedback item's client name.
      fix: "Add `min_length=1` to FeedbackUpdate fields: `client_name: str | None = Field(None, min_length=1)`"
      test_evidence: "BUG-005 from test-findings"
      promote: false

  warnings:
    - id: "WARN-001"
      file: "app/backend/app/schemas/feedback.py"
      line: "21-22, 29-30"
      title: "No max_length validation — will cause 500 in production PostgreSQL"
      description: >
        DB columns have varchar(255) for client_name and varchar(500) for summary,
        but Pydantic schemas have no max_length. SQLite (used in tests) doesn't
        enforce varchar length, so this passes in tests. PostgreSQL will raise
        DataError → 500 instead of the expected 422.
      fix: >
        Add max_length: `client_name: str = Field(min_length=1, max_length=255)`,
        `summary: str = Field(min_length=1, max_length=500)`
      risk: "Medium — production-only failure, invisible in tests"
      promote: true
      promote_reason: >
        Pattern: "Always add Pydantic max_length matching DB column length for varchar fields."
        This prevents production-only 500 errors that pass in SQLite test environments.

    - id: "WARN-002"
      file: "app/backend/app/schemas/feedback.py"
      title: "Whitespace-only strings accepted for client_name"
      description: >
        A string of only spaces "   " passes validation. Frontend trims before
        submit, so this only affects direct API consumers.
      fix: "Add a Pydantic validator that strips whitespace then checks min_length"
      risk: "Low — frontend mitigates, API-only edge case"
      promote: false

    - id: "WARN-003"
      file: "app/backend/app/routers/feedback.py"
      line: 24
      title: "List ordering not deterministic for same-second items"
      description: >
        ORDER BY date_logged DESC has no tiebreaker. Items created in the same
        second (SQLite) or microsecond (PostgreSQL under load) have arbitrary order.
      fix: "Add secondary sort: .order_by(Feedback.date_logged.desc(), Feedback.id.desc())"
      risk: "Low — cosmetic, but causes flaky test"
      promote: true
      promote_reason: >
        Pattern: "Always add a deterministic secondary sort (usually by id DESC)
        when ordering by timestamp." Prevents flaky tests and UI jitter.

    - id: "WARN-004"
      file: "app/backend/app/routers/feedback.py"
      line: 14
      title: "Variable shadowing: 'status' query param shadows fastapi.status module"
      description: >
        The query parameter name `status` shadows `from fastapi import status`.
        Safe now but fragile for future changes.
      fix: "Rename query param to `status_filter` or alias the import"
      risk: "Low"
      promote: false

    - id: "WARN-005"
      file: "app/frontend/package.json"
      title: "Zero frontend test infrastructure"
      description: >
        No vitest, @testing-library/react, jsdom, or any test framework in
        devDependencies. Frontend components have zero test coverage. The DoD
        requires tests for business logic, and the frontend has validation logic,
        debounce logic, and API integration that should be tested.
      fix: >
        Add vitest + @testing-library/react + jsdom to devDependencies.
        Write tests for: FeedbackForm validation, FilterBar filter logic,
        FeedbackListClient fetch/debounce behaviour.
      risk: "High — zero frontend coverage"
      promote: false

    - id: "WARN-006"
      file: "app/frontend/src/components/forms/FeedbackForm.tsx"
      title: "FeedbackForm component exceeds 30-line function limit"
      description: >
        The FeedbackForm function is ~298 lines. While this is common for React
        form components, the DoD says "No functions over 30 lines." The handlers
        inside are each well-sized, but the component as a whole is large. Could
        be decomposed: extract form field components, extract useFormState hook.
      fix: >
        Extract a useFormState custom hook for state/validation logic.
        Extract FormField component for repeated label+input+error pattern.
      risk: "Low — code is readable as-is, but violates DoD literally"
      promote: false

    - id: "WARN-007"
      file: "app/backend/app/models/feedback.py"
      line: 17
      title: "updated_at onupdate=func.now() not tested for PATCH"
      description: >
        The test suite verifies date_logged doesn't change on PATCH, but does not
        verify that updated_at DOES change. SQLAlchemy onupdate may behave
        differently with SQLite vs PostgreSQL. This regression would be invisible.
      fix: "Add assertion in test_update_does_not_change_date_logged that updated_at >= date_logged"
      risk: "Medium — audit trail field may silently break"
      promote: false

    - id: "WARN-008"
      file: "app/backend/pyproject.toml"
      line: 19
      title: "Test dependency pyyaml missing"
      description: >
        test_contracts.py imports yaml (pyyaml) to load the contract file, but
        pyyaml is not listed in dev dependencies. Tests only pass because pyyaml
        is installed as a transitive dependency (likely from alembic or uvicorn).
      fix: "Add 'pyyaml>=6.0' to [project.optional-dependencies] dev"
      risk: "Low — could break in clean install"
      promote: false

  notes:
    - id: "NOTE-001"
      title: "Implementation matches plan exactly — no deviations detected"
      description: >
        All files match the implementation plan's file list. Component tree
        matches. Data fetching strategy (client-side) matches. Enum values
