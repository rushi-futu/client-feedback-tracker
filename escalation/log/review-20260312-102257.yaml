issues:

  blockers:
    - id: "BLOCK-001"
      file: "app/backend/alembic/env.py"
      line: "N/A — file does not exist"
      description: |
        alembic/env.py is missing. The escalation (2026-03-12T10-00-00-risk.yaml)
        was raised by the backend agent but remains status: open. Without this file,
        `alembic upgrade head` cannot run, which blocks production database migration.
        The migration file exists (0001_create_feedback_items_table.py) but cannot
        execute without env.py.
      why_it_matters: "Production deployment is impossible without database migration capability."
      resolution: "Human approves and creates the standard alembic/env.py file per escalation Option A."

  warnings:
    - id: "WARN-001"
      file: "app/frontend/src/components/feedback/FeedbackForm.tsx"
      line: "37-275"
      description: |
        FeedbackForm component is 238 lines. While individual functions within it
        are under 30 lines, the component itself is large. The implementation plan
        explicitly chose a single component with mode prop over two separate components
        (Decision #4). This is justified but should be decomposed if more features are
        added (e.g., extracting field groups into sub-components).
      promote: false

    - id: "WARN-002"
      description: |
        No frontend component tests exist (INFRA-002 from test findings). The
        FeedbackForm, FilterBar, FeedbackTable, and FeedbackListClient components
        have significant client-side logic (validation, filtering) that is only
        tested indirectly through the API client tests. @testing-library/react
        is already in devDependencies — component tests should be added in a follow-up.
      promote: false

    - id: "WARN-003"
      file: "app/frontend/src/app/feedback/[id]/page.tsx"
      line: "28-29"
      description: |
        catch block on line 28 catches all errors from getFeedback() and treats them
        as "not found". A network error or 500 server error would show the same
        "Feedback item not found" message. Should differentiate between 404 and other
        errors to show appropriate messaging.
      promote: false

  notes:
    - id: "NOTE-001"
      description: |
        FeedbackListClient.tsx is an extra file not in the implementation plan's file
        list. This is a JUSTIFIED deviation: the plan specifies page.tsx as a server
        component with client children, but Next.js requires client state (useState for
        filters) to be in a "use client" component. Splitting into server page.tsx +
        client FeedbackListClient.tsx is the correct Next.js pattern.
      promote: true

    - id: "NOTE-002"
      description: |
        Button component includes a custom "destructive-outline" variant not in standard
        shadcn. This was added to match the ui-spec's "Delete button (full-width, red outline)".
        Clean addition — does not modify the shadcn base pattern.
      promote: true

    - id: "NOTE-003"
      description: |
        deleteFeedback() in api.ts correctly bypasses the generic request<T>() helper
        to avoid calling res.json() on a 204 No Content response. The tester agent
        wrote an adversarial test verifying this. Good defensive coding.
      promote: true

    - id: "NOTE-004"
      description: |
        list_feedback query includes secondary sort by id DESC (BUG-001 fix).
        This goes slightly beyond the contract ("descending date_logged order")
        but is a correct tiebreaker for deterministic ordering. Not a contract violation.
      promote: true

    - id: "NOTE-005"
      description: |
        pyproject.toml specifies requires-python = ">=3.11" while the implementation
        plan references api-patterns.md which shows ">=3.12". The backend .venv uses
        Python 3.11. Not a blocker but should be aligned.
      promote: false

