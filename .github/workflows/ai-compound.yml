# Compound Learning Loop
#
# Runs automatically after every merge to main.
# Reads the reviewer report from that feature, extracts patterns worth keeping,
# and writes them back into the skill files — so the next feature starts smarter.
#
# This is what makes the harness compound: each delivery improves the next.

name: Compound Learning Loop

on:
  pull_request:
    types: [closed]
    branches: [main]

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

jobs:
  compound:
    name: "Extract and promote patterns"
    # Only run when a PR is actually merged, not just closed
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Extract patterns from reviewer report
        run: |
          # Find the most recent review report committed in this PR
          REVIEW_REPORT=$(ls -t escalation/log/review-*.yaml 2>/dev/null | head -1 || echo "")

          if [ -z "$REVIEW_REPORT" ]; then
            echo "No review report found — skipping pattern extraction"
            exit 0
          fi

          echo "Processing review report: $REVIEW_REPORT"

          claude \
            --dangerously-skip-permissions \
            -p "$(cat << PROMPT
          You are updating the harness knowledge base after a successful feature delivery.

          Read the reviewer report at: $REVIEW_REPORT
          Find every item where promote: true

          For each item marked promote: true:
          1. Determine which skill file it belongs to (api-patterns, frontend-patterns,
             data-patterns, test-patterns, or architecture)
          2. Append the pattern to the correct file under .claude/skills/
          3. Format it as:
             ---
             ## Pattern: [name]
             <!-- Promoted: $(date +%Y-%m-%d) -->
             <!-- Source: $REVIEW_REPORT -->

             [pattern content]

          Only add patterns that are genuinely reusable across future features.
          Do not add one-off implementation details.
          If there are no promote: true items, output: NO_PATTERNS_TO_PROMOTE and stop.
          PROMPT
          )"

      - name: Commit promoted patterns
        run: |
          git config user.name "claude-code[bot]"
          git config user.email "claude-code[bot]@users.noreply.github.com"
          git add .claude/skills/
          if git diff --staged --quiet; then
            echo "No patterns promoted — skills unchanged"
          else
            PATTERN_COUNT=$(git diff --staged --name-only | wc -l | tr -d ' ')
            git commit -m "learn: promote patterns from merged feature [skip ci]

          Skill files updated: ${PATTERN_COUNT}
          Source: PR #${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }}"
            git push origin main
            echo "✅ Patterns promoted to skill files"
          fi
