# Compound Learning Loop
#
# Runs automatically after every merge to main. Two jobs:
# 1. Pattern promotion — extracts reusable patterns from the review report
#    and writes them back into skill files
# 2. Figma sync — captures the built UI and pushes it back to the Figma prototype
#    so the PM can iterate with Figma Make on what was actually shipped
#
# This is what makes the harness compound: each delivery improves the next.
# Configure in config/harness.config.yaml → compound_loop.

name: Compound Learning Loop

on:
  pull_request:
    types: [closed]
    branches: [main]

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

jobs:
  compound:
    name: "Extract and promote patterns"
    # Only run when a PR is actually merged, not just closed
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Extract patterns from reviewer report
        run: |
          # Find the most recent review report committed in this PR
          REVIEW_REPORT=$(ls -t escalation/log/review-*.yaml 2>/dev/null | head -1 || echo "")

          if [ -z "$REVIEW_REPORT" ]; then
            echo "No review report found — skipping pattern extraction"
            exit 0
          fi

          echo "Processing review report: $REVIEW_REPORT"

          claude \
            --dangerously-skip-permissions \
            -p "$(cat << PROMPT
          You are updating the harness knowledge base after a successful feature delivery.

          Read the reviewer report at: $REVIEW_REPORT
          Find every item where promote: true

          For each item marked promote: true:
          1. Determine which skill file it belongs to (api-patterns, frontend-patterns,
             data-patterns, test-patterns, or architecture)
          2. Append the pattern to the correct file under .claude/skills/
          3. Format it as:
             ---
             ## Pattern: [name]
             <!-- Promoted: $(date +%Y-%m-%d) -->
             <!-- Source: $REVIEW_REPORT -->

             [pattern content]

          Only add patterns that are genuinely reusable across future features.
          Do not add one-off implementation details.
          If there are no promote: true items, output: NO_PATTERNS_TO_PROMOTE and stop.
          PROMPT
          )"

      - name: Commit promoted patterns
        run: |
          git config user.name "claude-code[bot]"
          git config user.email "claude-code[bot]@users.noreply.github.com"
          git add .claude/skills/
          if git diff --staged --quiet; then
            echo "No patterns promoted — skills unchanged"
          else
            PATTERN_COUNT=$(git diff --staged --name-only | wc -l | tr -d ' ')
            git commit -m "learn: promote patterns from merged feature [skip ci]

          Skill files updated: ${PATTERN_COUNT}
          Source: PR #${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }}"
            git push origin main
            echo "✅ Patterns promoted to skill files"
          fi

  # ── Sync built UI back to Figma ──────────────────────────────────
  # Captures the running application and pushes it back to the Figma prototype.
  # PM can then use Figma Make to iterate on the updated design.
  # Only runs if figma_sync is enabled and figma_file_key is set in config.
  sync-to-figma:
    name: "Sync built UI → Figma prototype"
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check if Figma sync is enabled
        id: check
        run: |
          ENABLED=$(grep -A1 'figma_sync:' config/harness.config.yaml 2>/dev/null | grep 'enabled:' | awk '{print $2}' || echo "false")
          KEY=$(grep 'figma_file_key:' config/harness.config.yaml 2>/dev/null | awk '{print $2}' | tr -d '"' || echo "")
          echo "enabled=${ENABLED}" >> $GITHUB_OUTPUT
          echo "figma_key=${KEY}" >> $GITHUB_OUTPUT
          if [ "$ENABLED" != "true" ] || [ -z "$KEY" ]; then
            echo "Figma sync disabled or no file key set — skipping"
          fi

      - name: Install Claude Code
        if: steps.check.outputs.enabled == 'true' && steps.check.outputs.figma_key != ''
        run: npm install -g @anthropic-ai/claude-code

      - name: Capture and push to Figma
        if: steps.check.outputs.enabled == 'true' && steps.check.outputs.figma_key != ''
        env:
          FIGMA_KEY: ${{ steps.check.outputs.figma_key }}
        run: |
          claude \
            --dangerously-skip-permissions \
            -p "$(cat << PROMPT
          You are syncing the built application back to Figma as part of the compound loop.

          Figma file key: ${FIGMA_KEY}

          Read design/ui-spec.md to find the pages/routes to capture.
          Read config/harness.config.yaml for the stack to determine the dev server command.

          Your job:
          1. Install dependencies and start the dev server in the background
          2. Wait for it to be ready
          3. For each page/route in the ui-spec:
             - Call generate_figma_design (Figma MCP) to capture the running page
             - Use outputMode: existingFile with fileKey: ${FIGMA_KEY}
             - Follow the capture instructions returned by the tool
             - Poll with captureId until completed
          4. After all pages captured, use send_code_connect_mappings (Figma MCP) to link
             key components to their source files
          5. Stop the dev server
          6. Report what was captured and what was mapped
          PROMPT
          )"
